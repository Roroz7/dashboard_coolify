global:
  resolve_timeout: 5m

# ── TEMPLATES ────────────────────────────────────────────────────────────────
# route principal
route:
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "discord"

  # Routes spécifiques par sévérité
  routes:
    - match:
        severity: critical
      receiver: "discord-critical"
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: "discord"
      repeat_interval: 4h

# ── RECEIVERS ────────────────────────────────────────────────────────────────
receivers:

  # Alertes normales (warning)
  - name: "discord"
    webhook_configs:
      - url: "${DISCORD_WEBHOOK_URL}"
        send_resolved: true
        http_config:
          follow_redirects: true
        title: '{{ template "discord.title" . }}'
        # Discord attend un JSON avec "content"
        # On utilise le format webhook natif Alertmanager

  # Alertes critiques
  - name: "discord-critical"
    webhook_configs:
      - url: "${DISCORD_WEBHOOK_URL}"
        send_resolved: true
        title: '🚨 CRITIQUE — {{ .GroupLabels.alertname }}'

# ── INHIBIT RULES ────────────────────────────────────────────────────────────
inhibit_rules:
  # Si une alerte critique existe, masquer le warning correspondant
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
